# DARIVO PRO — CI/CD GitHub Actions
# Frontend → Vercel automático (integración nativa)
# Backend → Railway al hacer push a main (opcional si hay RAILWAY_TOKEN)
# Supabase → db push con supabase link en CI

name: DARIVO PRO — Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── TEST FRONTEND ──────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test -- --passWithNoTests
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # ─── TEST BACKEND ───────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Tests
        run: pytest tests/ -v
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          WA_PHONE_NUMBER_ID:    test
          WA_ACCESS_TOKEN:       test
          WA_VERIFY_TOKEN:       test
          SERVICE_KEY:           test

  # ─── DEPLOY BACKEND (solo en push a main, opcional) ─────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      secrets.RAILWAY_TOKEN != ''
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy a Railway (carpeta backend/)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service darivo-pro-api --detach --ci

  # ─── SUPABASE MIGRATIONS ────────────────────────────────────────────────────
  supabase-migrate:
    name: Supabase Migrations
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      secrets.SUPABASE_ACCESS_TOKEN != '' &&
      secrets.SUPABASE_DB_PASSWORD != ''
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: kyckjapprmtfahnkuucz
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verificar estructura supabase/
        run: |
          test -f supabase/config.toml || (echo "Falta supabase/config.toml" && exit 1)
          test -d supabase/migrations || (echo "Falta supabase/migrations/" && exit 1)
          ls -la supabase/migrations/

      - name: Vincular proyecto Supabase
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Aplicar migraciones (db push)
        run: supabase db push --yes

  # NOTA: El deploy del frontend en Vercel es automático
  # por la integración nativa GitHub ↔ Vercel
  # No se necesita step adicional aquí
