DARIVO PRO — CI/CD GitHub Actions
# Frontend → Vercel automático (integración nativa)
# Backend → Railway al hacer push a main (opcional si hay RAILWAY_TOKEN)
# Supabase → db push con supabase link en CI

name: DARIVO PRO — Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── TEST FRONTEND ──────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test -- --passWithNoTests
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # ─── TEST BACKEND ───────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Tests
        run: pytest tests/ -v
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          WA_PHONE_NUMBER_ID:    test
          WA_ACCESS_TOKEN:       test
          WA_VERIFY_TOKEN:       test
          SERVICE_KEY:           test

  # ─── DEPLOY BACKEND (solo en push a main, opcional) ─────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Railway CLI
        if: env.RAILWAY_TOKEN != ''
        run: npm install -g @railway/cli

      - name: Deploy a Railway (carpeta backend/)
        if: env.RAILWAY_TOKEN != ''
        run: railway up --service darivo-pro-api --detach --ci

  # ─── SUPABASE MIGRATIONS ────────────────────────────────────────────────────
  supabase-migrate:
    name: Supabase Migrations
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - name: "[TEMP] Diagnóstico secrets Supabase"
        run: |
          set -euo pipefail

          echo "=== Diagnóstico Supabase ==="

          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "SUPABASE_PROJECT_REF: EMPTY"
          else
            echo "SUPABASE_PROJECT_REF: SET (length=${#SUPABASE_PROJECT_REF})"

            if [ "${SUPABASE_PROJECT_REF}" = "vyrtokggypcmpforglch" ]; then
              echo "PROJECT_REF: OK"
            else
              echo "PROJECT_REF: MISMATCH"
            fi
          fi

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "SUPABASE_ACCESS_TOKEN: EMPTY"
          else
            echo "SUPABASE_ACCESS_TOKEN: SET (length=${#SUPABASE_ACCESS_TOKEN})"
          fi

          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "SUPABASE_DB_PASSWORD: EMPTY"
          else
            echo "SUPABASE_DB_PASSWORD: SET (length=${#SUPABASE_DB_PASSWORD})"
          fi

          echo "=== Fin diagnóstico ==="

      - name: Setup Supabase CLI
        if: env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_DB_PASSWORD != ''
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verificar estructura supabase/
        if: env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_DB_PASSWORD != ''
        run: |
          test -f supabase/config.toml || (echo "Falta supabase/config.toml" && exit 1)
          test -d supabase/migrations || (echo "Falta supabase/migrations/" && exit 1)
          ls -la supabase/migrations/

      - name: Vincular proyecto Supabase
        if: env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_DB_PASSWORD != ''
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Aplicar migraciones (db push)
        if: env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_DB_PASSWORD != ''
        run: supabase db push --password "$SUPABASE_DB_PASSWORD" --yes

  # NOTA: El deploy del frontend en Vercel es automático
  # por la integración nativa GitHub ↔ Vercel
  # No se necesita step adicional aquí
